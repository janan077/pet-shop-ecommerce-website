<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: #333;
        }
        .contact-section {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            padding: 20px;
        }
        h2 {
            text-align: center;
            color: #ff7e5f;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        input, textarea, button {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #ff7e5f;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #e06b55;
        }
        .success-message {
            color: green;
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .contact-info {
            margin-top: 30px;
            text-align: center;
            font-size: 1rem;
            color: #555;
        }
        .contact-info p {
            margin: 5px 0;
        }
        .contact-info span {
            color: #ff7e5f;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <section id="contact" class="contact-section">
        <h2>Contact Us</h2>
        <form id="contactForm">
            <input type="text" id="name" name="name" placeholder="Your Name" required>
            <input type="text" id="email" name="mail" placeholder="Your Email" required>
            <textarea id="message" name="message" rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
        <p class="success-message" id="successMessage">Thank you! Your message has been sent.</p>
        <div class="contact-info">
            <p><span>Email:</span> petshopmanagement213@gmail.com</p>
            <p><span>Phone:</span> +91-8105053829</p>
        </div>
    </section>
    <script>
        const form = document.getElementById('contactForm');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent default form submission

            const emailField = document.getElementById('email');
            const emailValue = emailField.value;

            // Check if the email contains an '@'
            if (!emailValue.includes('@')) {
                alert('Please enter a valid email address with an "@" symbol.');
                return; // Stop submission if email is invalid
            }

            successMessage.style.display = 'block'; // Show success message
            form.reset(); // Clear form inputs
        });

        // Allow Enter key to submit the form
        form.addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault(); // Prevent default form submission
                form.dispatchEvent(new Event('submit')); // Trigger the submit event
            }
        });
    </script>
</body>
</html>
