<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Pet Shop</title>
    <style>
        /* General Reset for Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            background-color: #f8f8f8;
            align-items:center;
        }

        header {
            background-color: #333;
            color: white;
            padding: 20px 0;
        }

        header .container {
            width: 80%;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
        }

        nav ul li a:hover {
            color: #ff7043;
        }

        .hero {
            background: #ff7043;
            color: white;
            text-align: center;
            padding: 80px 0;
        }

        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            align-items: center;
        }

        .hero .btn {
            background-color: #ff8a65;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .hero .btn:hover {
            background-color: #e75c34;
        }

        .products {
            padding: 40px 0;
            text-align: center;
            display:flex;
        }

        .product-list {
            display: flex;
            justify-content: center;
            flex-wrap:wrap;
            gap: 20px;
            align-items: center;
            margin: 110px;
        }

        .product {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 250px;
            text-align: center;
            margin-inline: 600px;
        }

        .product img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        .add-to-cart, .buy-now {
            background: #ff7043;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        .add-to-cart:hover, .buy-now:hover {
            background: #e75c34;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        .modal-content input,
        .modal-content select {
            margin: 10px 0;
            width: 90%;
            padding: 8px;
        }

        .modal-content button {
            background: #ff7043;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .modal-content button:hover {
            background: #e75c34;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: white;
        }

        /* Cart Modal Styles */
        #cartModal .modal-content {
            width: 400px;
        }

        #cartTable {
            width: 100%;
            margin-top: 10px;
            border-collapse: collapse;
        }

        #cartTable th, #cartTable td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        #cartTable th {
            background-color: #f2f2f2;
        }
       
    </style>
</head>
<body>
    <header>
        <div class="container">
            <img src="D:\web designing\pet animal logo.png" alt="Pet Shop Logo" style="height: 50px; margin-right: 20px;">
            <h1 class="logo">Creative Pet Shop</h1>
            <title>Creative Pet Shop</title>
            <nav>
                <ul>
                    <li><a href="product.html">Products</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h2>Welcome to Creative Pet Shop!</h2>
            <p>Your one-stop shop for pets and pet lovers. Find everything your pets need!</p><br><br>
        </div>
    </section>
    <div style="text-align: center;">
        <img src="D:\web designing\pet animal logo.png"height="300"width="300">
    </div>
</body>
